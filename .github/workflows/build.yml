name: Build Termin Tracker

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
    
    - name: Build Linux Distributable
      run: |
        cd java
        ./gradlew createDistributable --no-daemon
    
    - name: Upload Linux App
      uses: actions/upload-artifact@v4
      with:
        name: termin-tracker-linux
        path: java/desktop/build/compose/binaries/main/app/

  build-windows:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
    
    - name: Build Windows Distributable
      run: |
        cd java
        .\gradlew.bat createDistributable --no-daemon
      shell: powershell
    
    - name: Upload Windows App
      uses: actions/upload-artifact@v4
      with:
        name: termin-tracker-windows
        path: java/desktop/build/compose/binaries/main/app/

  build-macos:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
    
    - name: Build macOS Distributable
      run: |
        cd java
        ./gradlew createDistributable --no-daemon
    
    - name: Upload macOS App
      uses: actions/upload-artifact@v4
      with:
        name: termin-tracker-macos
        path: java/desktop/build/compose/binaries/main/app/

  release:
    needs: [build-linux, build-windows, build-macos]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v4
    
    - name: Create ZIP files
      run: |
        cd termin-tracker-linux && zip -r ../termin-tracker-linux.zip TerminTracker/ && cd ..
        cd termin-tracker-windows && zip -r ../termin-tracker-windows.zip TerminTracker/ && cd ..
        cd termin-tracker-macos && zip -r ../termin-tracker-macos.zip TerminTracker/ && cd ..
    
    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: |
          termin-tracker-linux.zip
          termin-tracker-windows.zip
          termin-tracker-macos.zip
        tag_name: v${{ github.run_number }}
        name: Release ${{ github.run_number }}
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}