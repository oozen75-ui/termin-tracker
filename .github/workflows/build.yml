name: Build Termin Tracker

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
    
    - name: Build with Gradle
      run: |
        cd java
        ./gradlew build --no-daemon
    
    - name: Upload Linux JAR
      uses: actions/upload-artifact@v4
      with:
        name: termin-tracker-linux
        path: |
          java/desktop/build/libs/*.jar
          java/common/build/libs/*.jar

  build-windows:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
    
    - name: Build with Gradle (Windows)
      run: |
        cd java
        .\gradlew.bat build --no-daemon
      shell: powershell
    
    - name: Upload Windows JAR
      uses: actions/upload-artifact@v4
      with:
        name: termin-tracker-windows
        path: |
          java/desktop/build/libs/*.jar
          java/common/build/libs/*.jar

  build-macos:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
    
    - name: Build with Gradle
      run: |
        cd java
        ./gradlew build --no-daemon
    
    - name: Upload macOS JAR
      uses: actions/upload-artifact@v4
      with:
        name: termin-tracker-macos
        path: |
          java/desktop/build/libs/*.jar
          java/common/build/libs/*.jar

  release:
    needs: [build-linux, build-windows, build-macos]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v4
    
    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: |
          termin-tracker-linux/**/*.jar
          termin-tracker-windows/**/*.jar
          termin-tracker-macos/**/*.jar
        tag_name: v${{ github.run_number }}
        name: Release ${{ github.run_number }}
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
